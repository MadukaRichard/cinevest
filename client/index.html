<!DOCTYPE html>
<html lang="en" class="dark">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default SEO (overridden per-page by react-helmet-async) -->

    <meta property="og:title" content="CineVest — Invest in Films" />
    <meta property="og:description" content="Invest in upcoming film projects, track your ROI in real-time, and connect with fellow investors on CineVest." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
