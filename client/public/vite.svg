<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- CineVest Logo -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f04438;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d92d20;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Film reel / Investment symbol -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)" />
  <circle cx="50" cy="50" r="35" fill="none" stroke="white" stroke-width="3" />
  <circle cx="50" cy="50" r="10" fill="white" />
  <!-- Film sprocket holes -->
  <circle cx="50" cy="20" r="4" fill="white" />
  <circle cx="50" cy="80" r="4" fill="white" />
  <circle cx="20" cy="50" r="4" fill="white" />
  <circle cx="80" cy="50" r="4" fill="white" />
</svg>
